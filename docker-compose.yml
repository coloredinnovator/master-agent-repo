version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hermes_postgres
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes_password
      POSTGRES_DB: hermes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.2
    container_name: hermes_kafka
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  # --- NEW 30-REPO INFRASTRUCTURE ---

  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: hermes_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma

  redis:
    image: redis:7-alpine
    container_name: hermes_redis
    ports:
      - "6379:6379"

  searxng:
    image: searxng/searxng:latest
    container_name: hermes_searxng
    ports:
      - "8080:8080"
    volumes:
      - searxng_data:/etc/searxng

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: hermes_prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:10.4.0
    container_name: hermes_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  # --- MASTER ORCHESTRATOR ---

  hermes:
    build: .
    container_name: hermes_agent
    environment:
      - PORT=8081 # Changed to 8081 to avoid conflict with SearxNG
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=hermes
      - POSTGRES_PASSWORD=hermes_password
      - POSTGRES_DB=hermes_db
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - CHROMADB_HOST=chromadb
      - REDIS_HOST=redis
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

volumes:
  postgres_data:
  redpanda_data:
  chromadb_data:
  searxng_data:
  prometheus_data:
  grafana_data:
