version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hermes_postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.2
    container_name: hermes_kafka
    command:
      - redpanda start
        --smp 1
        --memory 1G
        --reserve-memory 0M
        --overprovisioned
        --node-id 0
        --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
        --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: hermes_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hermes_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: hermes_searxng
    ports:
      - "8888:8080"
    volumes:
      - searxng_data:/etc/searxng
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: hermes_prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: hermes_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  hermes:
    build: .
    container_name: hermes_agent
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - CHROMADB_HOST=chromadb
      - REDIS_HOST=redis
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redpanda_data:
  chromadb_data:
  searxng_data:
  prometheus_data:
  grafana_data:
