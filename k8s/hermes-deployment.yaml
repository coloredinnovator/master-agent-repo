apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      containers:
      - name: hermes
        image: hermes-agent:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: POSTGRES_DB
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "redpanda:9092"
        - name: REDIS_HOST
          value: "redis"
        - name: CHROMADB_HOST
          value: "chromadb"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: hermes-agent
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
